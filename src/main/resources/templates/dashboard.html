<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ELMS Pro Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.navbar{
    background:#0d6efd;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0px 5px 15px rgba(0,0,0,.1);
}

.menu-btn{
    width:100%;
    margin-top:15px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<span class="navbar-brand">

ELMS PRO

</span>

<a href="/login" class="btn btn-light">

Logout

</a>

</div>

</nav>

<div class="container mt-5">

<h2>

Welcome 👋

</h2>

<p>

Employee Leave Management System Dashboard

</p>

<div class="row mt-4">

<div class="col-md-3">

<div class="card p-3">

<h5>Total Employees</h5>

<h2 id="totalEmployees">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card p-3">

<h5>Pending Leaves</h5>

<h2 id="pendingLeaves">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card p-3">

<h5>Approved Leaves</h5>

<h2 id="approvedLeaves">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card p-3">

<h5>Rejected Leaves</h5>

<h2 id="rejectedLeaves">0</h2>

</div>

</div>

</div>

<div class="row mt-5">

<div class="col-md-3">

<a href="/apply-leave" class="btn btn-primary menu-btn">

Apply Leave

</a>

</div>

<div class="col-md-3">

<a href="/leave-history" class="btn btn-success menu-btn">

Leave History

</a>

</div>

<div class="col-md-3">

<a href="/employees" class="btn btn-warning menu-btn">

Employees

</a>

</div>

<div class="col-md-3">

<a href="/profile" class="btn btn-dark menu-btn">

Profile

</a>

</div>

</div>

</div>

<script src="/js/dashboard.js"></script>

</body>
</html>
