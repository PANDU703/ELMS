<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ELMS Pro | Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
        }

        .register-card{
            max-width:700px;
            margin:40px auto;
            border:none;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,.15);
            padding:30px;
            background:white;
        }

        h2{
            color:#0d6efd;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<div class="register-card">

<div class="text-center mb-4">

<h2>ELMS PRO</h2>

<p>Employee Registration</p>

</div>

<form id="signupForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Employee Code</label>

<input
type="text"
id="employeeCode"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Select Department</label>

<select
id="departmentId"
class="form-select"
required>

<option value="">-- Select Department --</option>

</select>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>First Name</label>

<input
type="text"
id="firstName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Last Name</label>

<input
type="text"
id="lastName"
class="form-control"
required>

</div>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
id="phone"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Designation</label>

<input
type="text"
id="designation"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Joining Date</label>

<input
type="date"
id="joiningDate"
class="form-control"
required>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-primary">

Create Account

</button>

</div>

<div class="text-center mt-3">

Already have an account?

<a href="/login">

Login Here

</a>

</div>

</form>

</div>

</div>

<script src="/js/signup.js"></script>

</body>

</html>
