<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Manager Dashboard | ELMS Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0px 5px 15px rgba(0,0,0,.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.action-btn{
    width:100%;
    padding:25px;
    border-radius:15px;
    font-weight:bold;
}

</style>

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<span class="navbar-brand">

ELMS PRO - Manager

</span>

<a href="/login" class="btn btn-light">

Logout

</a>

</div>

</nav>

<div class="container mt-5">

<h2>

Welcome Manager 👨‍💼

</h2>

<p class="text-muted">

Manage employees and leave requests.

</p>

<!-- Dashboard Statistics -->

<div class="row mt-4">

<div class="col-md-3">

<div class="card text-center p-3">

<i class="bi bi-people-fill text-primary fs-1"></i>

<h5 class="mt-3">Employees</h5>

<h2 id="totalEmployees">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card text-center p-3">

<i class="bi bi-hourglass-split text-warning fs-1"></i>

<h5 class="mt-3">Pending</h5>

<h2 id="pendingLeaves">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card text-center p-3">

<i class="bi bi-check-circle-fill text-success fs-1"></i>

<h5 class="mt-3">Approved</h5>

<h2 id="approvedLeaves">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card text-center p-3">

<i class="bi bi-x-circle-fill text-danger fs-1"></i>

<h5 class="mt-3">Rejected</h5>

<h2 id="rejectedLeaves">0</h2>

</div>

</div>

</div>

<!-- Action Buttons -->

<div class="row mt-5">

<div class="col-md-4">

<a href="/employees"
class="btn btn-primary action-btn">

<i class="bi bi-people-fill fs-3"></i>

<br><br>

Employees

</a>

</div>

<div class="col-md-4">

<a href="/manage-leaves"
class="btn btn-success action-btn">

<i class="bi bi-calendar-check-fill fs-3"></i>

<br><br>

Manage Leave Requests

</a>

</div>

<div class="col-md-4">

<a href="/dashboard"
class="btn btn-secondary action-btn">

<i class="bi bi-house-fill fs-3"></i>

<br><br>

Employee Dashboard

</a>

</div>

</div>

</div>

<script src="/js/dashboard.js"></script>

</body>
</html>
