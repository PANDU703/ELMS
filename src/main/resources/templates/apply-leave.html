<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Apply Leave | ELMS Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="/dashboard">

ELMS PRO

</a>

<a href="/dashboard" class="btn btn-light">

Dashboard

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Apply Leave</h3>

</div>

<div class="card-body">

<form id="leaveForm">

<div class="mb-3">

<label class="form-label">

Employee ID

</label>

<input
type="number"
id="employeeId"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Leave Type ID

</label>

<input
type="number"
id="leaveTypeId"
class="form-control"
required>

</div>

<div class="row">

<div class="col">

<label class="form-label">

Start Date

</label>

<input
type="date"
id="startDate"
class="form-control"
required>

</div>

<div class="col">

<label class="form-label">

End Date

</label>

<input
type="date"
id="endDate"
class="form-control"
required>

</div>

</div>

<div class="mt-3">

<label class="form-label">

Reason

</label>

<textarea
id="reason"
class="form-control"
rows="4"
required>

</textarea>

</div>

<div class="mt-4">

<button
class="btn btn-primary"
type="submit">

Apply Leave

</button>

</div>

</form>

</div>

</div>

</div>

<script src="/js/apply-leave.js"></script>

</body>

</html>
